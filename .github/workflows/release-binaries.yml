# Cross-compiled standalone CLIs (no Node.js required on the user machine).
# Triggers: version tags v*.*.*, or manual run (artifacts only; no GitHub Release).
name: Release binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: jeml-linux-x64
          - target: bun-linux-arm64
            asset: jeml-linux-arm64
          - target: bun-darwin-arm64
            asset: jeml-darwin-arm64
          - target: bun-darwin-x64
            asset: jeml-darwin-x64
          - target: bun-windows-x64
            asset: jeml-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compile
        run: |
          mkdir -p dist-bin
          bun build --compile --target=${{ matrix.target }} ./src/cli.ts --outfile dist-bin/${{ matrix.asset }}

      - name: Smoke test (native Linux x64)
        if: matrix.target == 'bun-linux-x64'
        run: |
          chmod +x dist-bin/${{ matrix.asset }}
          ./dist-bin/${{ matrix.asset }} --help

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist-bin/${{ matrix.asset }}

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: SHA256 checksums
        working-directory: release-assets
        run: |
          set -e
          rm -f SHA256SUMS.txt
          for f in jeml-*; do
            [ -f "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS.txt
          done
          test -s SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: release-assets/*
