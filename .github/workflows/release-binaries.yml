# Cross-compiled standalone CLIs (no Node.js required on the user machine).
# Triggers: push a tag like v0.1.0, or Run workflow (optionally set release_tag to attach assets).
name: Release binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'If set, upload binaries to this GitHub Release tag (e.g. v0.1.0). Tag must exist on the remote. Leave empty for build + artifacts only.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: jotl-linux-x64
          - target: bun-linux-arm64
            asset: jotl-linux-arm64
          - target: bun-darwin-arm64
            asset: jotl-darwin-arm64
          - target: bun-darwin-x64
            asset: jotl-darwin-x64
          - target: bun-windows-x64
            asset: jotl-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compile
        run: |
          mkdir -p dist-bin
          bun build --compile --target=${{ matrix.target }} ./src/cli.ts --outfile dist-bin/${{ matrix.asset }}

      - name: Smoke test (native Linux x64)
        if: matrix.target == 'bun-linux-x64'
        run: |
          chmod +x dist-bin/${{ matrix.asset }}
          ./dist-bin/${{ matrix.asset }} --help

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist-bin/${{ matrix.asset }}

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: SHA256 checksums
        working-directory: release-assets
        run: |
          set -e
          rm -f SHA256SUMS.txt
          for f in jotl-*; do
            [ -f "$f" ] || continue
            sha256sum "$f" >> SHA256SUMS.txt
          done
          test -s SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || github.ref_name }}
          draft: false
          generate_release_notes: true
          files: release-assets/*
