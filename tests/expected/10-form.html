<!DOCTYPE html>
<html>
<head></head>
<body>
<h2>Contact form</h2>
<form id="contact">
<label>Your name<input type="text" name="name" required></label>
<label>Email address<input type="email" name="email" required></label>
<label>Subject<select name="subject"></select></label>
<label>Message<textarea name="message" rows="5"></textarea></label>
<label><input type="checkbox" name="newsletter">Subscribe to newsletter</label>
<button type="submit" class="primary">Send message</button>
</form>
</body>
</html>
