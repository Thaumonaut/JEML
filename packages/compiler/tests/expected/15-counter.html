<!DOCTYPE html>
<html>
<head>
<style data-jeml-preset="base">
/*
 * JEML — default stylesheet (preset: base)
 *
 * Foundation: new.css v1.1.3 by Xz (https://newcss.net) — MIT License.
 * A classless CSS framework that styles raw HTML elements directly.
 * We've vendored it here (renamed --nc-* tokens to --jeml-* for a single
 * theming surface) so JEML output stays self-contained with zero external
 * requests — no font CDN, no <link>, just one inline <style> block.
 *
 * On top of new.css we add a thin JEML primitives layer for the structural
 * classes the compiler emits (.jeml-grid, .jeml-stack, .jeml-group,
 * .jeml-card) plus a few quality-of-life rules that are tailored to JEML's
 * codegen (e.g. horizontal spacing between sibling <button> elements so
 * casual `> button: Add < > button: Reset <` layouts look right without a
 * `> group:` wrapper).
 *
 * Override any --jeml-* token from your own stylesheet to re-skin the
 * document. Opt out entirely with `>> style [preset=none]`.
 *
 * Upstream new.css source: https://newcss.net/new.min.css
 * Upstream license:        https://github.com/xz/new.css/blob/master/LICENSE
 */

/* ─── Tokens ──────────────────────────────────────────────────────────────── */

:root {
  --jeml-font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
    Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif,
    "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
  --jeml-font-mono: ui-monospace, SFMono-Regular, "SF Mono", Consolas, monaco,
    "Ubuntu Mono", "Liberation Mono", "Courier New", Courier, monospace;

  --jeml-tx-1: #000;
  --jeml-tx-2: #1a1a1a;
  --jeml-bg-1: #fff;
  --jeml-bg-2: #f6f8fa;
  --jeml-bg-3: #e5e7eb;
  --jeml-lk-1: #0070f3;
  --jeml-lk-2: #0366d6;
  --jeml-lk-tx: #fff;
  --jeml-ac-1: #79ffe1;
  --jeml-ac-tx: #0c4047;

  /* JEML-primitive tokens (used by .jeml-grid, .jeml-stack, .jeml-card, …) */
  --jeml-gap-sm: 0.5rem;
  --jeml-gap-md: 1rem;
  --jeml-gap-lg: 1.5rem;
  --jeml-radius: 6px;
}

@media (prefers-color-scheme: dark) {
  :root:not([data-theme="light"]) {
    --jeml-tx-1: #fff;
    --jeml-tx-2: #eee;
    --jeml-bg-1: #000;
    --jeml-bg-2: #111;
    --jeml-bg-3: #222;
    --jeml-lk-1: #3291ff;
    --jeml-lk-2: #0070f3;
    --jeml-lk-tx: #fff;
    --jeml-ac-1: #7928ca;
    --jeml-ac-tx: #fff;
  }
}

[data-theme="dark"] {
  --jeml-tx-1: #fff;
  --jeml-tx-2: #eee;
  --jeml-bg-1: #000;
  --jeml-bg-2: #111;
  --jeml-bg-3: #222;
  --jeml-lk-1: #3291ff;
  --jeml-lk-2: #0070f3;
  --jeml-lk-tx: #fff;
  --jeml-ac-1: #7928ca;
  --jeml-ac-tx: #fff;
}

/* ─── new.css foundation (verbatim, with --nc-* → --jeml-*) ───────────────── */

* {
  margin: 0;
  padding: 0;
}

address, area, article, aside, audio, blockquote, datalist, details, dl,
fieldset, figure, form, input, iframe, img, meter, nav, ol, optgroup, option,
output, p, pre, progress, ruby, section, table, textarea, ul, video {
  margin-bottom: 1rem;
}

html, input, select, button {
  font-family: var(--jeml-font-sans);
}

body {
  margin: 0 auto;
  max-width: 750px;
  padding: 2rem;
  border-radius: 6px;
  overflow-x: hidden;
  word-break: break-word;
  overflow-wrap: break-word;
  background: var(--jeml-bg-1);
  color: var(--jeml-tx-2);
  font-size: 1.03rem;
  line-height: 1.5;
}

::selection {
  background: var(--jeml-ac-1);
  color: var(--jeml-ac-tx);
}

p { margin-bottom: 1rem; }

h1, h2, h3, h4, h5, h6 {
  line-height: 1;
  color: var(--jeml-tx-1);
  padding-top: 0.875rem;
}

h1, h2, h3 {
  color: var(--jeml-tx-1);
  padding-bottom: 2px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--jeml-bg-2);
}

h4, h5, h6 { margin-bottom: 0.3rem; }

h1 { font-size: 2.25rem; }
h2 { font-size: 1.85rem; }
h3 { font-size: 1.55rem; }
h4 { font-size: 1.25rem; }
h5 { font-size: 1rem; }
h6 { font-size: 0.875rem; }

a            { color: var(--jeml-lk-1); }
a:hover      { color: var(--jeml-lk-2); }
abbr:hover   { cursor: help; }
abbr         { cursor: help; }

blockquote {
  padding: 1.5rem;
  background: var(--jeml-bg-2);
  border-left: 5px solid var(--jeml-bg-3);
}
blockquote :last-child {
  padding-bottom: 0;
  margin-bottom: 0;
}

header {
  background: var(--jeml-bg-2);
  border-bottom: 1px solid var(--jeml-bg-3);
  padding: 2rem 1.5rem;
  margin: -2rem calc(0px - (50vw - 50%)) 2rem;
  padding-left: calc(50vw - 50%);
  padding-right: calc(50vw - 50%);
}
header h1, header h2, header h3 {
  padding-bottom: 0;
  border-bottom: 0;
}
header > :first-child { margin-top: 0; padding-top: 0; }
header > :last-child  { margin-bottom: 0; }

a button,
button,
input[type="submit"],
input[type="reset"],
input[type="button"] {
  font-size: 1rem;
  display: inline-block;
  padding: 6px 12px;
  text-align: center;
  text-decoration: none;
  white-space: nowrap;
  background: var(--jeml-lk-1);
  color: var(--jeml-lk-tx);
  border: 0;
  border-radius: 4px;
  box-sizing: border-box;
  cursor: pointer;
}

a button[disabled],
button[disabled],
input[type="submit"][disabled],
input[type="reset"][disabled],
input[type="button"][disabled] {
  cursor: not-allowed;
  opacity: 0.5;
}

a button:focus, a button:hover,
button:focus, button:hover,
input[type="submit"]:focus, input[type="submit"]:hover,
input[type="reset"]:focus,  input[type="reset"]:hover,
input[type="button"]:focus, input[type="button"]:hover {
  background: var(--jeml-lk-2);
}

code, pre, kbd, samp { font-family: var(--jeml-font-mono); }

code, samp, kbd, pre {
  background: var(--jeml-bg-2);
  border: 1px solid var(--jeml-bg-3);
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 0.9rem;
}

kbd { border-bottom: 3px solid var(--jeml-bg-3); }

pre {
  padding: 1rem 1.4rem;
  max-width: 100%;
  overflow: auto;
}
pre code {
  background: inherit;
  font-size: inherit;
  color: inherit;
  border: 0;
  padding: 0;
  margin: 0;
}
code pre {
  display: inline;
  background: inherit;
  font-size: inherit;
  color: inherit;
  border: 0;
  padding: 0;
  margin: 0;
}

details {
  padding: 0.6rem 1rem;
  background: var(--jeml-bg-2);
  border: 1px solid var(--jeml-bg-3);
  border-radius: 4px;
}
summary { cursor: pointer; font-weight: 700; }
details[open] { padding-bottom: 0.75rem; }
details[open] summary { margin-bottom: 6px; }
details[open] > :last-child { margin-bottom: 0; }

dt { font-weight: 700; }
dd::before { content: '→ '; }

hr {
  border: 0;
  border-bottom: 1px solid var(--jeml-bg-3);
  margin: 1rem auto;
}

fieldset {
  margin-top: 1rem;
  padding: 2rem;
  border: 1px solid var(--jeml-bg-3);
  border-radius: 4px;
}
legend { padding: auto 0.5rem; }

table { border-collapse: collapse; width: 100%; }
td, th {
  border: 1px solid var(--jeml-bg-3);
  text-align: left;
  padding: 0.5rem;
}
th { background: var(--jeml-bg-2); }
tr:nth-child(even) { background: var(--jeml-bg-2); }
table caption { font-weight: 700; margin-bottom: 0.5rem; }

textarea { max-width: 100%; }

ol, ul { padding-left: 2rem; }
li { margin-top: 0.4rem; }
ul ul, ol ul, ul ol, ol ol { margin-bottom: 0; }

mark {
  padding: 3px 6px;
  background: var(--jeml-ac-1);
  color: var(--jeml-ac-tx);
}

textarea, select, input {
  padding: 6px 12px;
  margin-bottom: 0.5rem;
  background: var(--jeml-bg-2);
  color: var(--jeml-tx-2);
  border: 1px solid var(--jeml-bg-2);
  border-radius: 4px;
  box-shadow: none;
  box-sizing: border-box;
}
textarea:focus, select:focus, input[type]:focus {
  border: 1px solid var(--jeml-bg-3);
  outline: 0;
}

img { max-width: 100%; }

/* ─── JEML primitives layer (codegen-tied, not part of new.css) ──────────── */

/* Casual sibling buttons need a horizontal gap when they sit next to each
 * other inline (e.g. `> button: Add < > button: Reset <` without a wrapper). */
button + button,
button + a,
a + button,
input + button,
button + input {
  margin-left: var(--jeml-gap-sm);
}

/* Restore breathing room between paragraphs/headings and adjacent
 * inline-block buttons that immediately follow them. */
p + button,
p + a {
  margin-top: 0;
}

/* JEML grid primitive: CSS grid with author-controllable column count + gap. */
.jeml-grid {
  display: grid;
  gap: var(--jeml-gap-md);
  grid-template-columns: repeat(var(--cols, 1), minmax(0, 1fr));
}

/* Responsive grids carry a textual --gap token (e.g. "md") that CSS can't
 * resolve into a length, so we just use the default gap and let authors
 * override per-id when they need finer control. */
.jeml-grid[data-jeml-r] { gap: var(--jeml-gap-md); }

/* JEML stack: vertical flex with a uniform gap. */
.jeml-stack {
  display: flex;
  flex-direction: column;
  gap: var(--jeml-gap-md);
}

/* JEML group: horizontal flex with a uniform gap, wraps on overflow. */
.jeml-group {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: var(--jeml-gap-sm);
}

/* JEML card: padded surface with subtle border + rounded corners. */
.jeml-card {
  padding: var(--jeml-gap-lg);
  background: var(--jeml-bg-1);
  border: 1px solid var(--jeml-bg-3);
  border-radius: var(--jeml-radius);
}

/* When an .icon class lands on a tag, treat it as inline media and stop
 * it from inheriting button/link visuals. */
.icon {
  display: inline-block;
  vertical-align: middle;
  width: 1em;
  height: 1em;
  fill: currentColor;
}
</style>
<title>Counter</title>
</head>
<body>
<h1>Counter</h1>
<p>Clicks: <span data-jeml-text="state.count"></span></p>
<button data-jeml-on-press="handlers.increment">Add</button>
<button data-jeml-on-press="handlers.reset">Reset</button>
<p><span data-jeml-text="state.isDarkState"></span></p>
<button data-jeml-on-press="handlers.toggleIsDark">toggle dark mode</button>
<p><span data-jeml-text="state.x"></span></p>
<script>(function(){
  "use strict";
  if (typeof document === "undefined") return;
  var stateStore = Object.create(null);
  var scheduled = false;
  var state = new Proxy(stateStore, {
    get: function (t, k) { return t[k]; },
    set: function (t, k, v) { t[k] = v; schedule(); return true; },
    has: function (t, k) { return k in t; }
  });
  var handlers = Object.create(null);
  function schedule() {
    if (scheduled) return;
    scheduled = true;
    var raf = typeof requestAnimationFrame === "function"
      ? requestAnimationFrame
      : function (cb) { return setTimeout(function () { cb(0); }, 0); };
    raf(function () { scheduled = false; renderAll(); });
  }
  var cache = Object.create(null);
  function compile(expr) {
    if (cache[expr]) return cache[expr];
    try {
      cache[expr] = new Function("state", "handlers", "$scope", "return (" + expr + ");");
    } catch (err) {
      console.error("[jeml] compile error", expr, err);
      cache[expr] = function () { return ""; };
    }
    return cache[expr];
  }
  function evaluate(expr, scope) {
    try { return compile(expr)(state, handlers, scope); }
    catch (err) { console.error("[jeml] eval error", expr, err); return ""; }
  }
  function scopeOf(node) {
    var cur = node;
    while (cur) {
      if (cur.__jemlScope) return cur.__jemlScope;
      cur = cur.parentElement;
    }
    return {};
  }
  function fmt(v) {
    if (v === null || v === undefined) return "";
    if (typeof v === "object") try { return JSON.stringify(v); } catch (e) { return String(v); }
    return String(v);
  }
  var EVENT_ALIAS = { press: "click" };
  var wired = new WeakSet();
  function wireEvents(root) {
    var nodes = root.querySelectorAll("*");
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      if (wired.has(el)) continue;
      var attrs = el.attributes;
      var bound = false;
      for (var j = 0; j < attrs.length; j++) {
        var a = attrs[j];
        if (a.name.indexOf("data-jeml-on-") !== 0) continue;
        var type = a.name.slice("data-jeml-on-".length);
        var event = EVENT_ALIAS[type] || type;
        (function (element, expr, evtName) {
          element.addEventListener(evtName, function (event) {
            var scope = scopeOf(element);
            try {
              var fn = new Function(
                "state", "handlers", "$scope", "event",
                "var __v = (" + expr + "); if (typeof __v === 'function') return __v(event); return __v;"
              );
              fn(state, handlers, scope, event);
            } catch (err) {
              console.error("[jeml] handler error", expr, err);
            }
          });
        })(el, a.value, event);
        bound = true;
      }
      if (bound) wired.add(el);
    }
  }
  function stampIf(root) {
    var containers = root.querySelectorAll("[data-jeml-if]");
    for (var i = 0; i < containers.length; i++) {
      var c = containers[i];
      var templates = c.querySelectorAll(":scope > template[data-jeml-case]");
      var match = -1;
      var scope = scopeOf(c);
      for (var j = 0; j < templates.length; j++) {
        var expr = templates[j].getAttribute("data-jeml-case") || "";
        if (expr === "" || evaluate(expr, scope)) { match = j; break; }
      }
      if (c.__jemlIf === match) continue;
      var stamped = c.querySelectorAll(":scope > [data-jeml-if-content]");
      for (var k = 0; k < stamped.length; k++) stamped[k].remove();
      if (match >= 0) {
        var tmpl = templates[match];
        var wrap = document.createElement("div");
        wrap.setAttribute("data-jeml-if-content", "");
        wrap.style.display = "contents";
        wrap.appendChild(tmpl.content.cloneNode(true));
        wrap.__jemlScope = scope;
        c.appendChild(wrap);
      }
      c.__jemlIf = match;
    }
  }
  function stampFor(root) {
    var containers = root.querySelectorAll("[data-jeml-for]");
    for (var i = 0; i < containers.length; i++) {
      var c = containers[i];
      var expr = c.getAttribute("data-jeml-for") || "";
      var itemName = c.getAttribute("data-jeml-item") || "item";
      var indexName = c.getAttribute("data-jeml-index") || "";
      var tmpl = c.querySelector(":scope > template");
      if (!tmpl) continue;
      var parentScope = scopeOf(c);
      var list = evaluate(expr, parentScope);
      var items = Array.isArray(list) ? list : [];
      var old = c.querySelectorAll(":scope > [data-jeml-for-item]");
      for (var k = 0; k < old.length; k++) old[k].remove();
      for (var j = 0; j < items.length; j++) {
        var wrap = document.createElement("div");
        wrap.setAttribute("data-jeml-for-item", "");
        wrap.style.display = "contents";
        wrap.appendChild(tmpl.content.cloneNode(true));
        var childScope = {};
        for (var key in parentScope) childScope[key] = parentScope[key];
        childScope[itemName] = items[j];
        if (indexName) childScope[indexName] = j;
        wrap.__jemlScope = childScope;
        c.appendChild(wrap);
      }
    }
  }
  function renderText(root) {
    var nodes = root.querySelectorAll("[data-jeml-text]");
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      el.textContent = fmt(evaluate(el.getAttribute("data-jeml-text") || "", scopeOf(el)));
    }
  }
  function renderAttrs(root) {
    var nodes = root.querySelectorAll("*");
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      var attrs = el.attributes;
      var targets = [];
      for (var j = 0; j < attrs.length; j++) {
        if (attrs[j].name.indexOf("data-jeml-bind-") === 0) {
          targets.push({ name: attrs[j].name.slice("data-jeml-bind-".length), expr: attrs[j].value });
        }
      }
      for (var k = 0; k < targets.length; k++) {
        var value = evaluate(targets[k].expr, scopeOf(el));
        if (value === false || value === null || value === undefined) {
          el.removeAttribute(targets[k].name);
        } else if (value === true) {
          el.setAttribute(targets[k].name, "");
        } else {
          el.setAttribute(targets[k].name, fmt(value));
        }
      }
    }
  }
  function renderAll() {
    stampIf(document.body);
    stampFor(document.body);
    wireEvents(document.body);
    renderText(document.body);
    renderAttrs(document.body);
  }
  function boot() {
    try { state.count = 0
  state.x = 1

  state.isDark = false
  state.isDarkState = "light"

  handlers.toggleIsDark = function() {
    state.isDark = !state.isDark
    if(state.isDark) {
      state.isDarkState = "Dark"
    } else {
      state.isDarkState = "Light"
    }
  };

  handlers.increment = function() {
    state.count = state.count + 1
  };

  handlers.reset = function() {
    state.count = 0
  }; } catch (err) { console.error("[jeml] script error", err); }
    renderAll();
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot, { once: true });
  } else {
    boot();
  }
})();</script>
</body>
</html>
